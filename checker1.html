<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Schema Generator | Gemini 1.5 Flash</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6f7;
      color: #222;
      padding: 2rem;
    }
    h1 { color: #004aad; }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      margin-top: 1.5rem;
      background: #004aad;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #003a8c; }
    pre {
      background: #111;
      color: #0f0;
      padding: 1rem;
      border-radius: 6px;
      white-space: pre-wrap;
      margin-top: 1.5rem;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>AI Schema Generator (Gemini 1.5 Flash)</h1>
  <p>Enter details below and generate structured JSON-LD schema for your business or website.</p>

  <label for="schemaType">Select Schema Type:</label>
  <select id="schemaType">
    <option>LocalBusiness</option>
    <option>Organization</option>
    <option>Product</option>
    <option>Service</option>
    <option>Person</option>
    <option>Event</option>
    <option>Article</option>
  </select>

  <label for="businessName">Business / Entity Name:</label>
  <input type="text" id="businessName" placeholder="e.g. ARC UK Printing Solutions">

  <label for="websiteUrl">Website URL:</label>
  <input type="text" id="websiteUrl" placeholder="https://www.e-arc.co.uk/">

  <label for="extraPrompt">Additional Details (Optional):</label>
  <textarea id="extraPrompt" rows="4" placeholder="Address, rating, price range, contact, opening hours, etc."></textarea>

  <button onclick="generateSchema()">Generate Schema</button>

  <pre id="output">Your generated schema will appear here...</pre>

  <script>
    async function generateSchema() {
      const API_KEY = "AIzaSyDVQxh--vRjLUw6QNaxS16cCKWvGgf1GyM";
      const schemaType = document.getElementById("schemaType").value;
      const name = document.getElementById("businessName").value.trim();
      const website = document.getElementById("websiteUrl").value.trim();
      const extra = document.getElementById("extraPrompt").value.trim();
      const output = document.getElementById("output");

      if (!name || !website) {
        output.textContent = "⚠️ Please enter both name and website.";
        return;
      }

      output.textContent = "⏳ Generating schema... please wait.";

      const prompt = `Generate a valid JSON-LD schema for a ${schemaType}.
Name: ${name}
Website: ${website}
${extra ? "Extra details: " + extra : ""}
Use proper schema.org structure.`;

      try {
        const response = await fetch(
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
            }),
          }
        );

        const data = await response.json();
        console.log(data);

        if (data.error) {
          output.textContent = `❌ Error ${data.error.code}: ${data.error.message}`;
          return;
        }

        if (data.candidates && data.candidates.length > 0) {
          output.textContent = data.candidates[0].content.parts[0].text;
        } else {
          output.textContent = "⚠️ No response from Gemini API.";
        }
      } catch (err) {
        output.textContent = "❌ Request failed: " + err.message;
      }
    }
  </script>
</body>
</html>
