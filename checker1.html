<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Schema Generator</title>
  </head>
  <body>
    <button onclick="generate()">Generate Schema</button>
    <pre id="output"></pre>

    <script>
      async function generate() {
        const API_KEY = "AIzaSyDVQxh--vRjLUw6QNaxS16cCKWvGgf1GyM"; // replace safely for testing

        try {
          const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: "Generate JSON-LD schema for LocalBusiness."
                      }
                    ]
                  }
                ]
              }),
            }
          );

          const data = await response.json();
          console.log(data);

          if (data.candidates && data.candidates.length > 0) {
            document.getElementById("output").innerText =
              data.candidates[0].content.parts[0].text;
          } else {
            document.getElementById("output").innerText =
              "No valid output received. Check API key or quota.";
          }
        } catch (error) {
          document.getElementById("output").innerText =
            "Error: " + error.message;
        }
      }
    </script>
  </body>
</html>
