<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini 2.5 Flash Schema Generator</title>
</head>
<body>
  <h1>Gemini 2.5 Flash Schema Generator</h1>
  <button onclick="generate()">Generate Schema</button>
  <pre id="output"></pre>

  <script>
    async function generate() {
      const API_KEY = "AIzaSyDVQxh--vRjLUw6QNaxS16cCKWvGgf1GyM"; // Replace safely for local testing

      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [
              { parts: [{ text: "Generate JSON-LD schema for a LocalBusiness named ARC UK Printing Solutions with address, website, and contact details." }] }
            ]
          }),
        }
      );

      const data = await response.json();
      console.log(data);

      const output = document.getElementById("output");

      if (data.error) {
        output.innerText = `❌ Error ${data.error.code}: ${data.error.message}`;
      } else if (data.candidates && data.candidates.length > 0) {
        output.innerText = data.candidates[0].content.parts[0].text;
      } else {
        output.innerText = "⚠️ No response received.";
      }
    }
  </script>
</body>
</html>
