<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Gemini Schema Generator</title>
  </head>
  <body>
    <button onclick="generate()">Generate Schema</button>
    <pre id="output"></pre>

    <script>
      async function generate() {
        const API_KEY = "AIzaSyDVQxh--vRjLUw6QNaxS16cCKWvGgf1GyM";

        const endpoint =
          "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=" +
          API_KEY;

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [
                { parts: [{ text: "Generate JSON-LD schema for LocalBusiness." }] },
              ],
            }),
          });

          const data = await response.json();
          console.log(data);

          if (data.error) {
            document.getElementById("output").innerText =
              `Error ${data.error.code}: ${data.error.message}`;
            return;
          }

          if (data.candidates && data.candidates.length > 0) {
            document.getElementById("output").innerText =
              data.candidates[0].content.parts[0].text;
          } else {
            document.getElementById("output").innerText =
              "No response content found.";
          }
        } catch (error) {
          document.getElementById("output").innerText = "Error: " + error.message;
        }
      }
    </script>
  </body>
</html>
